<!DOCTYPE html>
<html>
<head>
    <title>Charbel's Sample Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 50px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: inline-block;
        }
        h1 {
            color: #2c3e50;
        }
        button {
            padding: 10px 20px;
            background-color: #3498db;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Welcome to My Website 🚀</h1>
    <p>This is my first published website.</p>
    <button onclick="alert('Website is working!')">Click Me</button>
</div>

</body>
</html>
