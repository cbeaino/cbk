<!DOCTYPE html>
<html>
<head>
  <title>Charbel Portfolio</title>
</head>
<body>

<h1>My Portfolio</h1>

<div id="auth">
  <h3>Register / Login</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none;">
  <h3>Welcome</h3>
  <textarea id="comment" placeholder="Write something..."></textarea>
  <button onclick="saveComment()">Save Comment</button>
  <button onclick="logout()">Logout</button>

  <h4>Your Comments:</h4>
  <ul id="commentsList"></ul>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, collection, addDoc, query, where, getDocs } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyDLBu4kGkOvnXgIav0RmH63bQt94cgsR_8",
  authDomain: "cbeaino.firebaseapp.com",
  projectId: "cbeaino",
  storageBucket: "cbeaino.firebasestorage.app",
  messagingSenderId: "238731920093",
  appId: "1:238731920093:web:379e6b9639a9700cc5d134",
  measurementId: "G-GFDWW273VS"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth();
  const db = getFirestore();

  window.register = async function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    alert("User Registered: " + userCredential.user.email);
  } catch (error) {
    alert("Register Error: " + error.message);
    console.error(error);
  }
  }

  window.login = async function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("Logged In!");
  } catch (error) {
    alert("Login Error: " + error.message);
    console.error(error);
  }
  }

  window.logout = async function() {
    await signOut(auth);
  }

  window.saveComment = async function() {
    const comment = document.getElementById("comment").value;
    await addDoc(collection(db, "comments"), {
      text: comment,
      user: auth.currentUser.uid
    });
    loadComments();
  }

  async function loadComments() {
    const q = query(collection(db, "comments"), where("user", "==", auth.currentUser.uid));
    const querySnapshot = await getDocs(q);

    const list = document.getElementById("commentsList");
    list.innerHTML = "";

    querySnapshot.forEach((doc) => {
      const li = document.createElement("li");
      li.textContent = doc.data().text;
      list.appendChild(li);
    });
  }

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("auth").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      loadComments();
    } else {
      document.getElementById("auth").style.display = "block";
      document.getElementById("dashboard").style.display = "none";
    }
  });

</script>

</body>
</html>
